<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Pochita Vjppro - Pro Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }
        .glass-card:focus-within {
            background: rgba(30, 41, 59, 0.8);
            border-color: #6366f1;
            transform: scale(1.02);
        }

        .input-field {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
        }

        .input-field::placeholder { color: #334155; }
        

        .currency-symbol {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-right: 4px;
            font-weight: 400;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md space-y-4">
    <div class="text-center mb-6">
        <h1 class="text-2xl font-black italic bg-gradient-to-r from-indigo-400 to-emerald-400 bg-clip-text text-transparent">
            POCHITA VJPPRO
        </h1>
        <p id="status" class="text-[10px] text-slate-500 tracking-widest mt-1 uppercase">Đang đồng bộ tỉ giá...</p>
    </div>

    <div id="converter-container" class="space-y-3">
        </div>
</div>

<script>
const config = [
    { id: 'NESO', name: 'NESO', icon: 'https://dailyneso.com/static/img/logo.png', color: 'text-indigo-400', symbol: '' },
    { id: 'NXPC', name: 'NXPC', icon: 'https://www.dailyneso.com/static/img/nxpc.png', color: 'text-emerald-400', symbol: '' },
    { id: 'USD', name: 'USD', icon: 'https://cdn-icons-png.flaticon.com/512/197/197484.png', color: 'text-blue-400', symbol: '$' },
    { id: 'VND', name: 'VND', icon: 'https://cdn-icons-png.flaticon.com/512/197/197473.png', color: 'text-red-400', symbol: '₫' }
];

let exchangeRates = {
    NXPC_USD: 0.279, 
    USD_VND: 26258.25,
    NESO_NXPC: 100000 
};

function formatNumber(val, isVND = false) {
    if (isNaN(val) || val === 0) return "";
    return new Intl.NumberFormat('de-DE', {
        minimumFractionDigits: 0,
        maximumFractionDigits: isVND ? 0 : 4
    }).format(val);
}

function cleanValue(str) {
    return parseFloat(str.replace(/\./g, '').replace(',', '.')) || 0;
}

const container = document.getElementById('converter-container');

config.forEach(item => {
    container.innerHTML += `
        <div class="glass-card">
            <img src="${item.icon}" class="w-10 h-10 rounded-full border border-slate-700">
            <div class="flex-1 flex items-center">
                <span class="currency-symbol">${item.symbol}</span>
                <input type="text" id="${item.id}" class="input-field" placeholder="0">
            </div>
            <span class="font-black italic ${item.color}">${item.name}</span>
        </div>
    `;
});

function updateAll(sourceId, rawValue) {
    const value = cleanValue(rawValue);
    let nxpcBase = 0;

    // Logic quy đổi về gốc NXPC
    if (sourceId === 'NESO') nxpcBase = value / exchangeRates.NESO_NXPC;
    else if (sourceId === 'NXPC') nxpcBase = value;
    else if (sourceId === 'USD') nxpcBase = value / exchangeRates.NXPC_USD;
    else if (sourceId === 'VND') nxpcBase = (value / exchangeRates.USD_VND) / exchangeRates.NXPC_USD;

    config.forEach(item => {
        if (item.id !== sourceId) {
            let result = 0;
            if (item.id === 'NESO') result = nxpcBase * exchangeRates.NESO_NXPC;
            else if (item.id === 'NXPC') result = nxpcBase;
            else if (item.id === 'USD') result = nxpcBase * exchangeRates.NXPC_USD;
            else if (item.id === 'VND') result = nxpcBase * exchangeRates.NXPC_USD * exchangeRates.USD_VND;
            
            document.getElementById(item.id).value = formatNumber(result, item.id === 'VND');
        }
    });
}

config.forEach(item => {
    const el = document.getElementById(item.id);
    
    el.addEventListener('input', (e) => {
        let cursorContent = e.target.value.replace(/[^0-9,]/g, '');
        
        let numericValue = cleanValue(cursorContent);
        if (cursorContent !== "") {
            if (cursorContent.endsWith(',')) {
                el.value = formatNumber(Math.floor(numericValue)) + ",";
            } else {
                el.value = formatNumber(numericValue, item.id === 'VND');
            }
        }
        
        updateAll(item.id, el.value);
    });
});


document.getElementById('status').innerText = `1 NXPC ≈ $${exchangeRates.NXPC_USD} | $1 ≈ ${formatNumber(exchangeRates.USD_VND)} VND`;

</script>
</body>
</html>
