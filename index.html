<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Pochita Vjppro - Rolling Numbers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f1f5f9; overflow-x: hidden; }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.25rem;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:focus-within {
            background: rgba(30, 41, 59, 0.8);
            transform: translateY(-2px);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .input-container {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
        }
        .real-input {
            position: absolute;
            inset: 0;
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-size: 1.75rem;
            font-weight: 900;
            color: transparent;
            caret-color: #6366f1;
            z-index: 10;
        }
        .display-view {
            font-size: 1.75rem;
            font-weight: 900;
            pointer-events: none;
            white-space: nowrap;
            display: flex;
            align-items: baseline;
        }
        .digit-inner { display: inline-block; min-width: 0.6em; text-align: center; }
        .decimal-dim { color: #475569; font-size: 0.75em; font-weight: 700; }
        .currency-symbol { color: #94a3b8; font-size: 1.2rem; margin-right: 6px; font-weight: 700; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md space-y-4">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-black italic tracking-tighter bg-gradient-to-r from-indigo-400 via-purple-400 to-emerald-400 bg-clip-text text-transparent">
            POCHITA VJPPRO
        </h1>
        <p id="status" class="text-[10px] text-slate-600 tracking-[0.3em] mt-2 uppercase font-bold"></p>
    </div>
    <div id="converter-list" class="space-y-3"></div>
</div>

<script>
const config = [
    { id: 'NESO', name: 'NESO', icon: 'https://dailyneso.com/static/img/logo.png', color: 'text-indigo-400', symbol: '' },
    { id: 'NXPC', name: 'NXPC', icon: 'https://www.dailyneso.com/static/img/nxpc.png', color: 'text-emerald-400', symbol: '' },
    { id: 'USD', name: 'USD', icon: 'https://cdn-icons-png.flaticon.com/512/197/197484.png', color: 'text-blue-400', symbol: '$' },
    { id: 'VND', name: 'VND', icon: 'https://cdn-icons-png.flaticon.com/512/197/197473.png', color: 'text-red-400', symbol: '₫' }
];

let rates = { NXPC_USD: 0.279, USD_VND: 26258.25, NESO_NXPC: 100000 };
let currentValues = { NESO: 0, NXPC: 0, USD: 0, VND: 0 };
let lastDisplayStrings = { NESO: "", NXPC: "", USD: "", VND: "" };

const list = document.getElementById('converter-list');
config.forEach(item => {
    list.innerHTML += `
        <div class="glass-card">
            <img src="${item.icon}" class="w-11 h-11 rounded-full border border-slate-800 shadow-xl">
            <div class="input-container">
                <span class="currency-symbol">${item.symbol}</span>
                <input type="text" id="raw-${item.id}" class="real-input" placeholder="0" autocomplete="off">
                <div class="display-view" id="view-${item.id}"></div>
            </div>
            <span class="font-black italic tracking-tighter ${item.color}">${item.name}</span>
        </div>
    `;
});

function createDigitSpans(str, id) {
    const container = document.getElementById(`view-${id}`);
    container.innerHTML = '';
    [...str].forEach((char) => {
        const span = document.createElement('span');
        if (/[0-9]/.test(char)) {
            span.className = 'digit-inner';
            span.innerText = char;
        } else {
            span.innerText = char;
            span.className = (char === ',' || char === '.') ? 'decimal-dim' : '';
            if(id === 'VND' && char === '.') span.className = 'opacity-30';
        }
        container.appendChild(span);
    });
}

function formatValue(val, id) {
    return val.toLocaleString('de-DE', { 
        minimumFractionDigits: id === 'VND' ? 0 : 4, 
        maximumFractionDigits: 4 
    });
}

function update(sourceId, str, isTyping = false) {
    let num = parseFloat(str.replace(/\./g, '').replace(',', '.')) || 0;
    let baseNXPC = 0;
    
    if (sourceId === 'NESO') baseNXPC = num / rates.NESO_NXPC;
    else if (sourceId === 'NXPC') baseNXPC = num;
    else if (sourceId === 'USD') baseNXPC = num / rates.NXPC_USD;
    else if (sourceId === 'VND') baseNXPC = (num / rates.USD_VND) / rates.NXPC_USD;

    config.forEach(item => {
        let targetVal = 0;
        if (item.id === 'NESO') targetVal = baseNXPC * rates.NESO_NXPC;
        else if (item.id === 'NXPC') targetVal = baseNXPC;
        else if (item.id === 'USD') targetVal = baseNXPC * rates.NXPC_USD;
        else if (item.id === 'VND') targetVal = baseNXPC * rates.NXPC_USD * rates.USD_VND;

        currentValues[item.id] = targetVal;
        let fmt = formatValue(targetVal, item.id);
        if (item.id === sourceId && isTyping) return;

        const container = document.getElementById(`view-${item.id}`);
        const oldStr = lastDisplayStrings[item.id] || "";

        if (oldStr.length !== fmt.length) {
            createDigitSpans(fmt, item.id);
        } else {
            const spans = container.querySelectorAll('.digit-inner');
            let digitIdx = 0;
            const fmtChars = [...fmt];
            const oldChars = [...oldStr];

            for (let i = fmtChars.length - 1; i >= 0; i--) {
                if (/[0-9]/.test(fmtChars[i])) {
                    const currentDigitIdx = fmtChars.slice(0, i).filter(c => /[0-9]/.test(c)).length;
                    const targetSpan = spans[currentDigitIdx];
                    
                    if (oldChars[i] !== fmtChars[i] && targetSpan) {
                        gsap.to(targetSpan, {
                            y: -8, opacity: 0, duration: 0.15,
                            onComplete: () => {
                                targetSpan.innerText = fmtChars[i];
                                gsap.fromTo(targetSpan, 
                                    { y: 8, opacity: 0 }, 
                                    { y: 0, opacity: 1, duration: 0.25, ease: "back.out(2)" }
                                );
                            },
                            delay: (fmtChars.length - i) * 0.02
                        });
                    }
                }
            }
        }
        lastDisplayStrings[item.id] = fmt;
        if (item.id !== sourceId) document.getElementById(`raw-${item.id}`).value = fmt;
    });
}

config.forEach(item => {
    const input = document.getElementById(`raw-${item.id}`);
    const view = document.getElementById(`view-${item.id}`);
    
    createDigitSpans("0", item.id);
    lastDisplayStrings[item.id] = formatValue(0, item.id);

    input.addEventListener('input', (e) => {
        let val = e.target.value.replace(/[^0-9,]/g, '');
        e.target.value = val;
        createDigitSpans(val || "0", item.id);
        update(item.id, val, true);
    });

    input.addEventListener('blur', (e) => {
        let fmt = formatValue(currentValues[item.id], item.id);
        createDigitSpans(fmt, item.id);
        e.target.value = fmt;
        lastDisplayStrings[item.id] = fmt;
    });
});

document.getElementById('status').innerText = `1 NXPC ≈ $${rates.NXPC_USD} | $1 ≈ ${rates.USD_VND.toLocaleString('de-DE')} VND`;
</script>
</body>
</html>
