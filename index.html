<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Pochita Vjppro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f1f5f9; }
        
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1.25rem;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .input-container {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
        }

        .real-input {
            position: absolute;
            inset: 0;
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-size: 1.75rem;
            font-weight: 900;
            color: transparent;
            caret-color: white;
            z-index: 10;
        }

        .display-view {
            font-size: 1.75rem;
            font-weight: 900;
            pointer-events: none;
            white-space: nowrap;
            display: flex;
            align-items: baseline;
        }

        .decimal-dim {
            color: #475569;
            font-size: 0.75em;
            font-weight: 700;
        }

        .currency-symbol {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-right: 6px;
            font-weight: 700;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md space-y-4">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-black italic tracking-tighter bg-gradient-to-r from-indigo-400 to-emerald-400 bg-clip-text text-transparent">
            POCHITA VJPPRO
        </h1>
        <p id="status" class="text-[10px] text-slate-600 tracking-[0.3em] mt-2 uppercase font-bold"></p>
    </div>

    <div id="converter-list" class="space-y-3"></div>
</div>

<script>
const config = [
    { id: 'NESO', name: 'NESO', icon: 'https://dailyneso.com/static/img/logo.png', color: 'text-indigo-400', symbol: '' },
    { id: 'NXPC', name: 'NXPC', icon: 'https://www.dailyneso.com/static/img/nxpc.png', color: 'text-emerald-400', symbol: '' },
    { id: 'USD', name: 'USD', icon: 'https://cdn-icons-png.flaticon.com/512/197/197484.png', color: 'text-blue-400', symbol: '$' },
    { id: 'VND', name: 'VND', icon: 'https://cdn-icons-png.flaticon.com/512/197/197473.png', color: 'text-red-400', symbol: '₫' }
];

let rates = { NXPC_USD: 0.279, USD_VND: 26258.25, NESO_NXPC: 100000 };

const list = document.getElementById('converter-list');
config.forEach(item => {
    list.innerHTML += `
        <div class="glass-card">
            <img src="${item.icon}" class="w-11 h-11 rounded-full border border-slate-800 shadow-xl">
            <div class="input-container">
                <span class="currency-symbol">${item.symbol}</span>
                <input type="text" id="raw-${item.id}" class="real-input" placeholder="0">
                <div class="display-view" id="view-${item.id}">
                    <span class="main-num">0</span><span class="decimal-dim"></span>
                </div>
            </div>
            <span class="font-black italic tracking-tighter ${item.color}">${item.name}</span>
        </div>
    `;
});

function formatDisplay(val, id) {
    if (!val && val !== 0) return { main: "0", decimal: "" };
    let s = val.toLocaleString('de-DE', { minimumFractionDigits: 0, maximumFractionDigits: 4 });
    let parts = s.split(',');
    return { 
        main: parts[0], 
        decimal: parts[1] ? `,${parts[1]}` : (id === 'VND' ? "" : ",0000") 
    };
}

function update(sourceId, str) {
    let num = parseFloat(str.replace(/\./g, '').replace(',', '.')) || 0;
    let base = 0;
    if (sourceId === 'NESO') base = num / rates.NESO_NXPC;
    else if (sourceId === 'NXPC') base = num;
    else if (sourceId === 'USD') base = num / rates.NXPC_USD;
    else if (sourceId === 'VND') base = (num / rates.USD_VND) / rates.NXPC_USD;

    config.forEach(item => {
        let res = 0;
        if (item.id === 'NESO') res = base * rates.NESO_NXPC;
        else if (item.id === 'NXPC') res = base;
        else if (item.id === 'USD') res = base * rates.NXPC_USD;
        else if (item.id === 'VND') res = base * rates.NXPC_USD * rates.USD_VND;

        let fmt = formatDisplay(res, item.id);
        document.getElementById(`view-${item.id}`).innerHTML = `<span>${fmt.main}</span><span class="decimal-dim">${fmt.decimal}</span>`;
        if (item.id !== sourceId) {
            document.getElementById(`raw-${item.id}`).value = fmt.main + (fmt.decimal ? fmt.decimal : "");
        }
    });
}

config.forEach(item => {
    const input = document.getElementById(`raw-${item.id}`);
    input.addEventListener('input', (e) => {
        let val = e.target.value.replace(/[^0-9,]/g, '');
        let num = parseFloat(val.replace(',', '.')) || 0;
        let fmt = formatDisplay(num, item.id);
        
        e.target.value = fmt.main + (val.includes(',') ? ',' + val.split(',')[1] : "");
        update(item.id, e.target.value);
    });
});

document.getElementById('status').innerText = `1 NXPC ≈ $${rates.NXPC_USD} | $1 ≈ ${rates.USD_VND.toLocaleString('de-DE')} VND`;
</script>
</body>
</html>
